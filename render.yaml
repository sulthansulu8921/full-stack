databases:
  - name: shopco-db
    plan: free
    ipAllowList: [] # Only allow internal connections

services:
  # 1. Django Backend
  - type: web
    name: shopco-backend
    runtime: python
    plan: free
    rootDir: shopco-backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopco-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

  # 2. React Frontend
  - type: static
    name: shopco-frontend
    rootDir: shopco-frontend
    buildCommand: "npm run build"
    publishPath: "build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: shopco-backend
          property: host
